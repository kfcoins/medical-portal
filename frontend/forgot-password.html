<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — PharmaTrust Ghana</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    body { min-height: 100vh; background: linear-gradient(135deg, #0D3B2E 0%, #1A6349 50%, #0D3B2E 100%); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-container { width: 100%; max-width: 440px; }
    .auth-logo { text-align: center; margin-bottom: 32px; color: white; }
    .auth-logo .logo-icon { margin: 0 auto 12px; width: 56px; height: 56px; font-size: 1.5rem; border-radius: 14px; background: #2D9A6A; display: flex; align-items: center; justify-content: center; }
    .auth-logo h2 { font-family: 'Sora', sans-serif; font-size: 1.5rem; color: white; }
    .auth-logo p { color: rgba(255,255,255,0.6); font-size: 0.88rem; margin-top: 6px; }
    .auth-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 24px 64px rgba(0,0,0,0.3); }
    .auth-card h3 { font-family: 'Sora', sans-serif; font-size: 1.4rem; color: #0F1923; margin-bottom: 8px; }
    .auth-card .subtitle { color: #6B7D8C; font-size: 0.88rem; margin-bottom: 28px; }
    .input-group { position: relative; margin-bottom: 16px; }
    .input-group i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #6B7D8C; font-size: 0.9rem; }
    .input-group input { width: 100%; padding: 13px 14px 13px 40px; border: 1.5px solid #E8EDF2; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.9rem; color: #0F1923; outline: none; transition: 0.2s; }
    .input-group input:focus { border-color: #2D9A6A; box-shadow: 0 0 0 3px rgba(45,154,106,0.1); }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #6B7D8C; }
    .auth-footer a { color: #2D9A6A; font-weight: 600; }
    .form-error { display: none; background: #FFF5F5; color: #E53E3E; padding: 12px 16px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; border: 1px solid #FED7D7; align-items: center; gap: 8px; font-weight: 500; }
    .form-error.visible { display: flex; animation: slideIn 0.3s ease; }
    .form-success { display: none; background: #F0FFF4; color: #2D9A6A; padding: 12px 16px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 16px; border: 1px solid #C6F6D5; align-items: center; gap: 8px; font-weight: 500; }
    .form-success.visible { display: flex; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    @media(max-width: 768px) {
      body { padding: 24px 16px; }
      .auth-card { padding: 32px 24px; }
    }
    @media(max-width: 480px) {
      .auth-card { padding: 24px 16px; }
      .auth-logo h2 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-shield-virus"></i></div>
      <h2>PharmaTrust Ghana</h2>
      <p>Secure Password Recovery</p>
    </div>
    <div class="auth-card">
      <h3 id="cardTitle">Forgot Password</h3>
      <p class="subtitle" id="cardSubtitle">Enter your registered email address</p>

      <!-- Step 1: Request OTP -->
      <form id="emailForm">
        <div id="emailError" class="form-error">
          <i class="fas fa-exclamation-circle"></i>
          <span id="emailErrorText"></span>
        </div>
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" id="emailInput" placeholder="Email Address" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fas fa-paper-plane"></i> Send OTP Code
        </button>
      </form>

      <!-- Step 2: Verify OTP and Reset Password (Hidden initially) -->
      <form id="resetForm" style="display: none;">
        <div id="resetError" class="form-error">
          <i class="fas fa-exclamation-circle"></i>
          <span id="resetErrorText"></span>
        </div>
        <div id="resetSuccess" class="form-success">
          <i class="fas fa-check-circle"></i>
          <span id="resetSuccessText">Password reset successfully! Redirecting...</span>
        </div>
        <p style="text-align: center; color: #6B7D8C; margin-bottom: 20px; font-size: 0.9rem;">
          We've sent a 6-digit code to your email. Enter it below along with your new password.
        </p>
        <div class="input-group">
          <i class="fas fa-key"></i>
          <input type="text" id="otpCode" name="otp" placeholder="Enter 6-digit code" maxlength="6" required style="text-align: center; letter-spacing: 5px; font-size: 1.2rem; font-weight: bold;"/>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="newPassword" name="new_password" placeholder="New Password" style="padding-right: 40px;" required/>
          <i class="fas fa-eye toggle-password" style="left: auto; right: 14px; cursor: pointer;"></i>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="confirmPassword" placeholder="Confirm New Password" style="padding-right: 40px;" required/>
          <i class="fas fa-eye toggle-password" style="left: auto; right: 14px; cursor: pointer;"></i>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fas fa-check-circle"></i> Reset Password
        </button>
      </form>

      <p class="auth-footer" style="margin-top: 30px;">Remembered your password? <a href="login.html">Sign In</a></p>
    </div>
  </div>
  <script>
    const API_BASE = '../backend/api';
    let currentEmail = '';

    // Hide error when user starts typing
    document.querySelectorAll('#emailForm input').forEach(input => {
      input.addEventListener('input', () => {
        document.getElementById('emailError').classList.remove('visible');
      });
    });

    document.querySelectorAll('#resetForm input').forEach(input => {
      input.addEventListener('input', () => {
        document.getElementById('resetError').classList.remove('visible');
      });
    });

    document.getElementById('emailForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const errDiv = document.getElementById('emailError');
      errDiv.classList.remove('visible');
      
      const email = document.getElementById('emailInput').value;
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      
      try {
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
        submitBtn.disabled = true;

        const response = await fetch(`${API_BASE}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });

        const data = await response.json();

        if (data.success) {
          currentEmail = email;
          document.getElementById('emailForm').style.display = 'none';
          document.getElementById('resetForm').style.display = 'block';
          document.getElementById('cardTitle').textContent = 'Reset Password';
          document.getElementById('cardSubtitle').textContent = 'Create a new secure password';
        } else {
          document.getElementById('emailErrorText').textContent = data.message || 'Failed to send OTP.';
          errDiv.classList.add('visible');
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        }
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('emailErrorText').textContent = 'A network error occurred. Please try again.';
        errDiv.classList.add('visible');
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errDiv = document.getElementById('resetError');
      errDiv.classList.remove('visible');

      const otp = document.getElementById('otpCode').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        document.getElementById('resetErrorText').textContent = 'Passwords do not match.';
        errDiv.classList.add('visible');
        return;
      }

      if (newPassword.length < 8) {
        document.getElementById('resetErrorText').textContent = 'Password must be at least 8 characters long.';
        errDiv.classList.add('visible');
        return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;

      try {
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
        submitBtn.disabled = true;

        const response = await fetch(`${API_BASE}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail, otp: otp, new_password: newPassword })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));

          document.getElementById('resetSuccess').classList.add('visible');
          submitBtn.innerHTML = '<i class="fas fa-check"></i> Success!';
          submitBtn.style.background = '#2D9A6A';
          
          setTimeout(() => {
            const role = data.role;
            if (role === 'admin') window.location.href = 'admin-dashboard.html';
            else if (role === 'pharmacy') window.location.href = 'pharmacy-dashboard.html';
            else window.location.href = 'index.html';
          }, 2000);
        } else {
          document.getElementById('resetErrorText').textContent = data.message || 'Invalid or expired OTP.';
          errDiv.classList.add('visible');
          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        }
      } catch (error) {
        document.getElementById('resetErrorText').textContent = 'Network error. Try again.';
        errDiv.classList.add('visible');
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });
  </script>
<script src="js/main.js?v=2"></script>
</body>
</html>
