<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages — PharmaTrust Ghana</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    :root {
      --primary: #1A6349;
      --primary-light: #2D9A6A;
      --bg: #F4F7FA;
      --surface: #FFFFFF;
      --text: #0F1923;
      --text-muted: #6B7D8C;
      --border: #E8EDF2;
      --sidebar-width: 260px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
    
    /* Sidebar */
    .sidebar { width: var(--sidebar-width); background: #FFFFFF; color: #4A5568; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; transition: transform 0.3s; border-right: 1px solid var(--border); }
    .sidebar-header { padding: 32px 24px; display: flex; align-items: center; gap: 12px; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1.4rem; background: #4A47A3; color: white; letter-spacing: 1px; }
    .sidebar-header i { font-size: 1.6rem; color: white; }
    .nav-links { padding: 24px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
    .nav-link { display: flex; align-items: center; gap: 16px; padding: 14px 20px; color: #4A5568; text-decoration: none; border-radius: 24px; font-weight: 500; font-size: 0.95rem; transition: 0.2s; position: relative; }
    .nav-link:hover { background: #F7FAFC; color: #1A202C; }
    .nav-link.active { background: #F0EDF7; color: #4A47A3; font-weight: 600; }
    .nav-link i { width: 24px; text-align: center; font-size: 1.15rem; }
    .sidebar-footer { padding: 24px 16px; border-top: 1px solid var(--border); background: white; }
    .logout-btn { display: flex; align-items: center; justify-content: flex-start; gap: 16px; padding: 14px 20px; color: #4A5568; background: transparent; text-decoration: none; border-radius: 24px; font-weight: 500; transition: all 0.2s ease; cursor: pointer; border: none; width: 100%; text-align: left; font-size: 0.95rem; font-family: inherit; box-shadow: none; position: relative; }
    .logout-btn:hover { background: #FFF5F5; color: #E53E3E; }
    .logout-btn i { width: 24px; text-align: center; font-size: 1.15rem; }

    /* Main Content */
    .main-content { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .top-header { background: var(--surface); height: 72px; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .header-title { font-family: 'Sora', sans-serif; font-size: 1.25rem; font-weight: 600; }
    .user-profile { display: flex; align-items: center; gap: 12px; font-weight: 500; }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-light); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: 'Sora', sans-serif; }

    /* Chat Layout */
    .chat-container { display: flex; flex: 1; overflow: hidden; }
    .chat-sidebar { width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .chat-sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .chat-sidebar-header input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #E2E8F0; outline: none; background: #F8FAFC; font-size: 0.9rem; }
    .conversations-list { flex: 1; overflow-y: auto; }
    
    .conversation-item { display: flex; gap: 12px; padding: 16px 20px; cursor: pointer; border-bottom: 1px solid #F1F5F9; transition: background 0.2s; }
    .conversation-item:hover { background: #F8FAFC; }
    .conversation-item.active { background: #EFF6FF; border-left: 3px solid #3B82F6; }
    .conv-avatar { width: 44px; height: 44px; border-radius: 50%; background: #E2E8F0; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #475569; flex-shrink: 0; }
    .conv-details { flex: 1; overflow: hidden; }
    .conv-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .conv-name { font-weight: 600; color: #1E293B; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-time { font-size: 0.75rem; color: #94A3B8; }
    .conv-message { font-size: 0.85rem; color: #64748B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .unread-badge { display: inline-block; background: #EF4444; color: white; border-radius: 10px; padding: 2px 6px; font-size: 0.7rem; font-weight: bold; margin-left: 6px; }

    .chat-main { flex: 1; display: flex; flex-direction: column; background: #F8FAFC; position: relative; }
    .chat-header { padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    
    .message-bubble { max-width: 75%; padding: 14px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .message-incoming { align-self: flex-start; background: #FFFFFF; color: var(--text); border-bottom-left-radius: 4px; border: 1px solid rgba(0,0,0,0.02); }
    .message-outgoing { align-self: flex-end; background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2); }
    .message-time { font-size: 0.7rem; margin-top: 6px; text-align: right; opacity: 0.7; font-weight: 500; }
    
    .chat-input-area { padding: 16px 24px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(226, 232, 240, 0.6); display: flex; gap: 12px; align-items: center; box-shadow: 0 -4px 20px rgba(0,0,0,0.02); }
    .chat-input { flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #E2E8F0; outline: none; background: #F8FAFC; font-size: 0.95rem; transition: all 0.2s ease; box-shadow: inset 0 2px 4px rgba(0,0,0,0.01); }
    .chat-input:focus { border-color: #3B82F6; background: #FFFFFF; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .send-btn { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
    .send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(59, 130, 246, 0.4); }
    .send-btn:disabled { background: #94A3B8; cursor: not-allowed; box-shadow: none; transform: none; }

    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94A3B8; }
    .empty-state i { font-size: 4rem; margin-bottom: 16px; color: #CBD5E1; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-shield-virus"></i> PharmaTrust
    </div>
    <div class="nav-links">
      <a href="patient-dashboard.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
      <a href="patient-prescriptions.html" class="nav-link"><i class="fas fa-file-prescription"></i> My Prescriptions</a>
      <a href="patient-store.html" class="nav-link"><i class="fas fa-store-alt"></i> Pharmacy Store</a>
      <a href="patient-orders.html" class="nav-link"><i class="fas fa-history"></i> Order History</a>
      <a href="patient-messages.html" class="nav-link active"><i class="fas fa-envelope"></i> Messages</a>
      <a href="patient-profile.html" class="nav-link"><i class="fas fa-user-circle"></i> Profile</a>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div class="header-title">Messages</div>
      <div class="header-actions" style="display: flex; align-items: center;">

        <a href="#" class="notification-icon" title="Notifications" style="position: relative; color: #6B7D8C; font-size: 1.25rem; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #F4F7FA; transition: 0.2s; margin-right: 16px;" onmouseover="this.style.background='#E8EDF2'; this.style.color='var(--primary)';" onmouseout="this.style.background='#F4F7FA'; this.style.color='#6B7D8C';">
          <i class="fas fa-bell"></i>
          <span style="position: absolute; top: 8px; right: 9px; width: 8px; height: 8px; background-color: #E53E3E; border-radius: 50%; border: 2px solid #F4F7FA;"></span>
        </a>
      <div class="user-profile">
        <div class="user-avatar" id="userInitial">P</div>
        <span id="userName">Patient Name</span>
      </div>
      </div>
    </header>

    <div class="chat-container">
      <!-- Sidebar List -->
      <div class="chat-sidebar">
        <div class="chat-sidebar-header">
          <input type="text" id="searchInput" placeholder="Search conversations...">
        </div>
        <div class="conversations-list" id="conversationsList">
          <div style="padding: 20px; text-align: center; color: #94A3B8;">Loading conversations...</div>
        </div>
      </div>

      <!-- Main Chat Area -->
      <div class="chat-main" id="chatMain">
        <div style="background: #FFFBEB; color: #B45309; padding: 10px; text-align: center; font-size: 0.85rem; border-bottom: 1px solid #FEF3C7;">
          <i class="fas fa-info-circle"></i> Note: Messages are automatically deleted after 7 days for your privacy.
        </div>
        <div class="empty-state">
          <i class="far fa-comments"></i>
          <h3>Your Messages</h3>
          <p>Select a conversation from the sidebar to start chatting.</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    let activeContactId = null;
    let wsConn = null;
    let typingTimeout = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user'));

      if (!token || !user || user.role !== 'patient') {
        window.location.href = 'login.html';
        return;
      }
      
      const name = user.first_name + ' ' + user.last_name;
      document.getElementById('userName').textContent = name;
      document.getElementById('userInitial').textContent = name.charAt(0);

      loadConversations();

      const urlParams = new URLSearchParams(window.location.search);
      const contactId = urlParams.get('contact_id');
      const contactName = urlParams.get('contact_name');
      if (contactId && contactName) {
        setTimeout(() => {
          openConversation(contactId, decodeURIComponent(contactName));
        }, 100);
      }

      // Initialize WebSocket
      wsConn = new WebSocket('ws://localhost:8081?token=' + token);
      wsConn.onopen = function(e) {
          console.log("WebSocket connection established");
      };
      wsConn.onmessage = function(e) {
          const payload = JSON.parse(e.data);
          if (payload.type === 'message') {
              const msg = payload.data;
              if (activeContactId === msg.sender_id || activeContactId === msg.receiver_id) {
                  appendMessage(msg, user.id);
              }
              loadConversations(false);
          } else if (payload.type === 'typing') {
              if (activeContactId === payload.sender_id) {
                  showTypingIndicator();
              }
          }
      };
    });

    async function loadConversations(showLoader = true) {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('../backend/index.php?route=messages/conversations', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const listElem = document.getElementById('conversationsList');
        
        if (data.success) {
          if (data.conversations.length === 0) {
              if(showLoader) listElem.innerHTML = '<div style="padding: 20px; text-align: center; color: #94A3B8;">No conversations yet.</div>';
              return;
          }
          listElem.innerHTML = data.conversations.map(c => {
            let previewMsg = c.last_message;
            try {
              const p = JSON.parse(previewMsg);
              if (p.type === 'invoice') previewMsg = 'Received a custom invoice';
            } catch(e) {}
            return `
            <div class="conversation-item ${c.contact_id === activeContactId ? 'active' : ''}" onclick="openConversation('${c.contact_id}', '${c.contact_name.replace(/'/g, "\\'")}')">
              <div class="conv-avatar">${c.contact_name.charAt(0)}</div>
              <div class="conv-details">
                <div class="conv-header">
                  <span class="conv-name">${c.contact_name}</span>
                  <span class="conv-time">${formatTime(c.created_at)}</span>
                </div>
                <div class="conv-message">${previewMsg} ${c.unread_count > 0 ? '<span class="unread-badge">New</span>' : ''}</div>
              </div>
            </div>
            `;
          }).join('');
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function openConversation(contactId, contactName) {
      activeContactId = contactId;
      document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
      const activeEl = Array.from(document.querySelectorAll('.conversation-item')).find(el => el.getAttribute('onclick').includes(contactId));
      if(activeEl) activeEl.classList.add('active');

      const chatMain = document.getElementById('chatMain');
      document.querySelector('.chat-container').classList.add('mobile-chat-active');
      chatMain.innerHTML = `
        <div class="chat-header">
          <button class="mobile-back-btn" onclick="document.querySelector('.chat-container').classList.remove('mobile-chat-active')" style="display: none; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text); margin-right: 12px;"><i class="fas fa-arrow-left"></i></button>
          <div class="conv-avatar" style="width:40px; height:40px;">${contactName.charAt(0)}</div>
          <div style="font-weight: 600;">${contactName}</div>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div style="text-align: center; padding: 20px; color: #94A3B8;">Loading messages...</div>
        </div>
        <form class="chat-input-area" id="chatForm">
          <input type="text" class="chat-input" id="messageInput" placeholder="Type your message here..." autocomplete="off" required>
          <button type="submit" class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </form>
      `;

      document.getElementById('chatForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          sendMessage();
      });

      document.getElementById('messageInput').addEventListener('input', () => {
          sendTypingEvent();
      });

      await loadMessages(contactId, true);
    }

    async function loadMessages(contactId, scroll = false) {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch(`../backend/index.php?route=messages/history/${contactId}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const msgContainer = document.getElementById('chatMessages');
        if (!msgContainer) return; // Switched away

        if (data.success) {
            if (data.messages.length === 0) {
                msgContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: #94A3B8;">Say hello!</div>';
            } else {
                const user = JSON.parse(localStorage.getItem('user'));
                msgContainer.innerHTML = data.messages.map(m => {
                    const isOutgoing = m.sender_id === user.id;
                    let displayMessage = m.message;
                    
                    try {
                      const payload = JSON.parse(m.message);
                      if (payload.type === 'invoice') {
                        const medJson = JSON.stringify({
                          id: payload.medicine_id,
                          name: payload.name,
                          price: payload.price,
                          image_url: null,
                          agent_id: payload.agent_id,
                          pharmacy_name: payload.agent_name
                        }).replace(/'/g, "&#39;");
                        
                        displayMessage = `
                          <div style="background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px; padding: 16px; margin-top: 8px; width: 100%; max-width: 300px; color: #1e293b; text-align: left;">
                            <div style="font-size: 0.75rem; font-weight: 700; color: #3b82f6; text-transform: uppercase; margin-bottom: 8px;">
                              <i class="fas fa-file-invoice-dollar"></i> Custom Prescription Invoice
                            </div>
                            <div style="font-weight: 600; font-size: 1rem; margin-bottom: 4px;">${payload.name}</div>
                            <div style="font-size: 0.85rem; color: #64748b; margin-bottom: 12px; line-height: 1.4;">${payload.prescription || 'No notes provided.'}</div>
                            <div style="font-weight: 700; color: #1A6349; font-size: 1.1rem; margin-bottom: 16px;">GHS ${parseFloat(payload.price).toFixed(2)}</div>
                            <button onclick='addInvoiceToCart(${medJson})' style="width: 100%; padding: 10px; background: #1A6349; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">
                              Add to Cart
                            </button>
                          </div>
                        `;
                      }
                    } catch (e) {
                      // Normal text message
                    }

                    return `
                      <div class="message-bubble ${isOutgoing ? 'message-outgoing' : 'message-incoming'}">
                        ${displayMessage}
                        <div class="message-time">${formatTime(m.created_at)}</div>
                      </div>
                    `;
                }).join('');
            }
            if (scroll) {
                msgContainer.scrollTop = msgContainer.scrollHeight;
            }
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const btn = document.getElementById('sendBtn');
        const msg = input.value.trim();
        if(!msg || !activeContactId || !wsConn) return;

        input.disabled = true;
        btn.disabled = true;

        try {
            wsConn.send(JSON.stringify({
                receiver_id: activeContactId,
                message: msg
            }));
            input.value = '';
        } catch(e) {
            console.error(e);
            alert('Connection error');
        } finally {
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        }
    }

    function appendMessage(payload) {
        const msgContainer = document.getElementById('chatMessages');
        if (!msgContainer) return;

        // Remove empty state if present
        const emptyState = msgContainer.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        const user = JSON.parse(localStorage.getItem('user'));
        const isOutgoing = payload.sender_id === user.id;

        let displayMessage = payload.message;
        try {
          const parsed = JSON.parse(payload.message);
          if (parsed.type === 'invoice') {
            const medJson = JSON.stringify({
              id: parsed.medicine_id,
              name: parsed.name,
              price: parsed.price,
              image_url: null,
              agent_id: parsed.agent_id,
              pharmacy_name: parsed.agent_name
            }).replace(/'/g, "&#39;");
            
            displayMessage = `
              <div style="width: 100%; min-width: 220px; max-width: 260px; color: #1e293b; text-align: left;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
                  <div style="width: 36px; height: 36px; border-radius: 10px; background: #EFF6FF; color: #3B82F6; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;">
                    <i class="fas fa-file-invoice-dollar"></i>
                  </div>
                  <div>
                    <div style="font-size: 0.65rem; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 0.5px;">Prescription</div>
                    <div style="font-weight: 700; font-size: 1rem; color: #1E293B; line-height: 1.2;">Invoice</div>
                  </div>
                </div>
                <div style="background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 10px; padding: 12px; margin-bottom: 12px;">
                  <div style="font-weight: 700; font-size: 0.95rem; color: #0F1923; margin-bottom: 4px;">${parsed.name}</div>
                  <div style="font-size: 0.8rem; color: #64748b; line-height: 1.4;">${parsed.prescription || 'No notes provided.'}</div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 4px;">
                  <div style="font-size: 0.75rem; color: #64748B; font-weight: 700;">TOTAL AMOUNT</div>
                  <div style="font-weight: 800; color: #1A6349; font-size: 1.2rem;">GHS ${parseFloat(parsed.price).toFixed(2)}</div>
                </div>
                <button onclick='addInvoiceToCart(${medJson})' style="width: 100%; padding: 12px; background: linear-gradient(135deg, #1A6349 0%, #134e3a 100%); color: white; border: none; border-radius: 10px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(26, 99, 73, 0.25); display: flex; align-items: center; justify-content: center; gap: 8px;">
                  <i class="fas fa-shopping-cart"></i> Add to Cart
                </button>
              </div>
            `;
          }
        } catch (e) {}

        const msgHtml = `
          <div class="message-bubble ${isOutgoing ? 'message-outgoing' : 'message-incoming'}">
            ${displayMessage}
            <div class="message-time">${formatTime(payload.created_at || new Date())}</div>
          </div>
        `;
        msgContainer.insertAdjacentHTML('beforeend', msgHtml);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function addInvoiceToCart(medicine) {
      let cart = [];
      const savedCart = localStorage.getItem('cart');
      if (savedCart) {
        cart = JSON.parse(savedCart);
      }
      
      const existingItem = cart.find(item => item.medicine.id === medicine.id);
      if (existingItem) {
        alert('This invoice is already in your cart.');
        return;
      }
      
      cart.push({ medicine, quantity: 1 });
      localStorage.setItem('cart', JSON.stringify(cart));
      
      alert('Invoice added to your cart! Please proceed to the store to checkout.');
    }

    function showTypingIndicator() {
        let msgContainer = document.getElementById('chatMessages');
        if (!msgContainer) return;
        
        let typingInd = document.getElementById('typingIndicator');
        if (!typingInd) {
            typingInd = document.createElement('div');
            typingInd.id = 'typingIndicator';
            typingInd.className = 'message-bubble message-incoming';
            typingInd.style.fontStyle = 'italic';
            typingInd.style.opacity = '0.7';
            typingInd.innerText = 'Typing...';
            msgContainer.appendChild(typingInd);
        }
        msgContainer.scrollTop = msgContainer.scrollHeight;
        
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            if (typingInd) typingInd.remove();
        }, 3000);
    }
    
    function sendTypingEvent() {
        if (!wsConn || !activeContactId) return;
        wsConn.send(JSON.stringify({
            type: 'typing',
            receiver_id: activeContactId
        }));
    }

    function formatTime(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }
  </script>
  <script src="js/responsive.js"></script>
</body>
</html>
