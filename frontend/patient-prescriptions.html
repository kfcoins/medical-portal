<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Prescriptions — PharmaTrust Ghana</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #1A6349;
      --primary-light: #2D9A6A;
      --bg: #F4F7FA;
      --surface: #FFFFFF;
      --text: #0F1923;
      --text-muted: #6B7D8C;
      --border: #E8EDF2;
      --sidebar-width: 260px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
    
    /* Sidebar */
    .sidebar { width: var(--sidebar-width); background: #FFFFFF; color: #4A5568; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; transition: transform 0.3s; border-right: 1px solid var(--border); }
    .sidebar-header { padding: 32px 24px; display: flex; align-items: center; gap: 12px; font-family: 'Sora', sans-serif; font-weight: 700; font-size: 1.4rem; background: #4A47A3; color: white; letter-spacing: 1px; }
    .sidebar-header i { font-size: 1.6rem; color: white; }
    .nav-links { padding: 24px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
    .nav-link { display: flex; align-items: center; gap: 16px; padding: 14px 20px; color: #4A5568; text-decoration: none; border-radius: 24px; font-weight: 500; font-size: 0.95rem; transition: 0.2s; position: relative; }
    .nav-link:hover { background: #F7FAFC; color: #1A202C; }
    .nav-link.active { background: #F0EDF7; color: #4A47A3; font-weight: 600; }
    .nav-link i { width: 24px; text-align: center; font-size: 1.15rem; }
    .sidebar-footer { padding: 24px 16px; border-top: 1px solid var(--border); background: white; }
    .logout-btn { display: flex; align-items: center; justify-content: flex-start; gap: 16px; padding: 14px 20px; color: #4A5568; background: transparent; text-decoration: none; border-radius: 24px; font-weight: 500; transition: all 0.2s ease; cursor: pointer; border: none; width: 100%; text-align: left; font-size: 0.95rem; font-family: inherit; box-shadow: none; position: relative; }
    .logout-btn:hover { background: #FFF5F5; color: #E53E3E; }
    .logout-btn i { width: 24px; text-align: center; font-size: 1.15rem; }

    /* Main Content */
    .main-content { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; min-height: 100vh; }
    .top-header { background: var(--surface); height: 72px; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 90; }
    .header-title { font-family: 'Sora', sans-serif; font-size: 1.25rem; font-weight: 600; }
    .user-profile { display: flex; align-items: center; gap: 12px; font-weight: 500; }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-light); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: 'Sora', sans-serif; }

    .content-area { padding: 32px; }

    .action-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Sora', sans-serif; }
    .btn-primary:hover { background: var(--primary-light); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .card { background: var(--surface); border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 16px; border: 1px solid var(--border); }
    .card-header { display: flex; justify-content: space-between; align-items: center; }
    .rx-id { font-family: 'Sora', sans-serif; font-weight: 600; color: var(--text); }
    .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; text-transform: capitalize; }
    .status-pending { background: #FEF3C7; color: #D97706; }
    .status-confirmed { background: #DBEAFE; color: #2563EB; }
    .status-dispensed { background: #E0E7FF; color: #4F46E5; }
    .status-delivered { background: #D1FAE5; color: #059669; }
    .status-cancelled { background: #FEE2E2; color: #DC2626; }
    
    .card-body { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; flex: 1; }
    .card-body p { margin-bottom: 8px; }
    .card-body strong { color: var(--text); }
    .rx-image-preview { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.2s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal { background: var(--surface); width: 100%; max-width: 500px; border-radius: 16px; padding: 32px; transform: translateY(20px); transition: 0.3s; }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-header h3 { font-family: 'Sora', sans-serif; font-size: 1.25rem; }
    .close-btn { background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.9rem; font-weight: 500; color: var(--text); margin-bottom: 8px; }
    .form-control { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.95rem; }
    .form-control:focus { outline: none; border-color: var(--primary); }
    .file-drop { border: 2px dashed var(--border); border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; background: #F8FAFC; transition: 0.2s; }
    .file-drop:hover { border-color: var(--primary); background: #F0FDF4; }
    .file-drop i { font-size: 2rem; color: var(--primary); margin-bottom: 12px; }
    #selectedFileName { display: block; margin-top: 12px; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }

    /* Lightbox */
    #lightbox { display: none; position: fixed; z-index: 2000; padding-top: 100px; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.9); text-align: center; }
    #lightbox img { margin: auto; display: block; max-width: 90%; max-height: 80vh; border-radius: 8px; }
    .lightbox-close { position: absolute; top: 30px; right: 40px; color: #f1f1f1; font-size: 40px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <i class="fas fa-shield-virus"></i> PharmaTrust
    </div>
    <div class="nav-links">
      <a href="patient-dashboard.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
      <a href="patient-prescriptions.html" class="nav-link active"><i class="fas fa-file-prescription"></i> My Prescriptions</a>
      <a href="patient-store.html" class="nav-link"><i class="fas fa-store-alt"></i> Pharmacy Store</a>
      <a href="patient-orders.html" class="nav-link"><i class="fas fa-history"></i> Order History</a>
      <a href="patient-messages.html" class="nav-link"><i class="fas fa-envelope"></i> Messages</a>
      <a href="patient-profile.html" class="nav-link"><i class="fas fa-user-circle"></i> Profile</a>
    </div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div class="header-title">My Prescriptions</div>
      <div class="header-actions" style="display: flex; align-items: center;">

        <a href="#" class="notification-icon" title="Notifications" style="position: relative; color: #6B7D8C; font-size: 1.25rem; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #F4F7FA; transition: 0.2s; margin-right: 16px;" onmouseover="this.style.background='#E8EDF2'; this.style.color='var(--primary)';" onmouseout="this.style.background='#F4F7FA'; this.style.color='#6B7D8C';">
          <i class="fas fa-bell"></i>
          <span style="position: absolute; top: 8px; right: 9px; width: 8px; height: 8px; background-color: #E53E3E; border-radius: 50%; border: 2px solid #F4F7FA;"></span>
        </a>
      <div class="user-profile">
        <div class="user-avatar" id="userInitial">P</div>
        <span id="userName">Patient Name</span>
      </div>
      </div>
    </header>

    <div class="content-area">
      <div class="action-header">
        <p style="color: var(--text-muted);">Manage your prescriptions and get quotes from pharmacies.</p>
        <button class="btn-primary" onclick="openUploadModal()"><i class="fas fa-upload"></i> Upload Prescription</button>
      </div>

      <div class="grid" id="prescriptionsGrid">
        <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted);">
          Loading your prescriptions...
        </div>
      </div>
    </div>
  </main>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Upload Prescription</h3>
        <button class="close-btn" onclick="closeUploadModal()">&times;</button>
      </div>
      <form id="uploadForm" onsubmit="handleUpload(event)">
        <div class="form-group">
          <label>Select Pharmacy</label>
          <select class="form-control" id="pharmacySelect" required>
            <option value="">Loading pharmacies...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prescription Image/PDF</label>
          <div class="file-drop" onclick="document.getElementById('rxFile').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <div>Click to browse files</div>
            <span id="selectedFileName">No file selected</span>
          </div>
          <input type="file" id="rxFile" style="display: none;" accept=".jpg,.jpeg,.png,.pdf" onchange="document.getElementById('selectedFileName').textContent = this.files[0]?.name || 'No file selected'" required>
        </div>
        <div class="form-group">
          <label>Additional Notes (Optional)</label>
          <textarea class="form-control" id="rxNotes" rows="3" placeholder="Any specific instructions?"></textarea>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;" id="uploadBtn">Submit Prescription</button>
      </form>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <img id="lightboxImg" src="">
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));

    if (!token || !user || user.role !== 'patient') {
      window.location.href = 'login.html';
    } else {
      const name = user.first_name + ' ' + user.last_name;
      document.getElementById('userName').textContent = name;
      document.getElementById('userInitial').textContent = name.charAt(0);
      
      loadPrescriptions();
      loadPharmacies();
    }

    async function loadPrescriptions() {
      try {
        const response = await fetch('../backend/index.php?route=patient/prescriptions', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await response.json();
        
        const grid = document.getElementById('prescriptionsGrid');
        
        if (data.success) {
          if(data.prescriptions.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; padding: 40px; background: white; border-radius: 12px; border: 1px dashed var(--border);">
              <i class="fas fa-folder-open" style="font-size: 3rem; color: #CBD5E1; margin-bottom: 16px;"></i>
              <p style="color: var(--text-muted);">You haven't uploaded any prescriptions yet.</p>
            </div>`;
            return;
          }

          grid.innerHTML = data.prescriptions.map(rx => `
            <div class="card">
              <div class="card-header">
                <span class="rx-id">RX-${rx.id.substring(7, 15)}</span>
                <span class="status-badge status-${rx.status}">${rx.status}</span>
              </div>
              <img src="../backend/${rx.prescription}" class="rx-image-preview" onclick="openLightbox('../backend/${rx.prescription}')" onerror="this.src='https://via.placeholder.com/300x160?text=PDF/Document'; this.style.cursor='default'; this.onclick=null;">
              <div class="card-body">
                <p><strong>Pharmacy:</strong> ${rx.pharmacy_name || 'Not assigned'}</p>
                <p><strong>Date:</strong> ${new Date(rx.created_at).toLocaleString()}</p>
                ${rx.notes ? `<p><strong>Notes:</strong> ${rx.notes}</p>` : ''}
              </div>
              ${rx.status === 'quoted' ? `<button class="btn-primary" style="padding: 8px 16px; font-size: 0.9rem;">View Quote</button>` : ''}
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('Error loading prescriptions:', error);
      }
    }

    async function loadPharmacies() {
      try {
        const response = await fetch('../backend/index.php?route=agents', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await response.json();
        const select = document.getElementById('pharmacySelect');
        
        if (data.success) {
          select.innerHTML = '<option value="">-- Select Pharmacy --</option>' + 
            data.agents.map(a => `<option value="${a.id}">${a.pharmacy_name} (${a.region})</option>`).join('');
        }
      } catch (e) {
        console.error(e);
      }
    }

    function openUploadModal() {
      document.getElementById('uploadModal').classList.add('active');
    }
    
    function closeUploadModal() {
      document.getElementById('uploadModal').classList.remove('active');
      document.getElementById('uploadForm').reset();
      document.getElementById('selectedFileName').textContent = 'No file selected';
    }

    async function handleUpload(e) {
      e.preventDefault();
      const btn = document.getElementById('uploadBtn');
      const fileInput = document.getElementById('rxFile');
      
      if (!fileInput.files[0]) {
        alert('Please select a file.');
        return;
      }

      btn.textContent = 'Uploading...';
      btn.disabled = true;

      const formData = new FormData();
      formData.append('prescription_file', fileInput.files[0]);
      formData.append('agent_id', document.getElementById('pharmacySelect').value);
      formData.append('notes', document.getElementById('rxNotes').value);

      try {
        const response = await fetch('../backend/index.php?route=patient/prescriptions/upload', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          body: formData
        });
        
        const data = await response.json();
        if(data.success) {
          closeUploadModal();
          loadPrescriptions();
        } else {
          alert(data.message || 'Upload failed');
        }
      } catch (error) {
        alert('Upload failed');
      } finally {
        btn.textContent = 'Submit Prescription';
        btn.disabled = false;
      }
    }

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').style.display = 'block';
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
